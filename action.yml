name: 'Run Posit Workbench'
description: 'Run Posit Workbench in Docker for testing'
inputs:
  license-key:
    description: 'Posit Workbench license key'
    required: true
  version:
    description: 'Workbench version to use (release, preview, or specific version)'
    required: false
    default: 'release'
  image:
    description: 'Container image to use (overrides version)'
    required: false
  port:
    description: 'Port to expose Workbench on'
    required: false
    default: '8787'
  user:
    description: 'Test username to create'
    required: false
    default: 'testuser'
  password:
    description: 'Password for test user (auto-generated if not specified)'
    required: false
  quiet:
    description: 'Suppress progress indicators during image pull'
    required: false
    default: 'false'
  env:
    description: 'Environment variables to pass to Docker container (one per line, format: KEY=VALUE)'
    required: false
  command:
    description: 'Command to run against Workbench (omit to start Workbench and output credentials)'
    required: false
  stop:
    description: 'Container ID to stop (use instead of starting a new container)'
    required: false

outputs:
  WORKBENCH_URL:
    description: 'Workbench server URL (only set when no command is provided)'
    value: ${{ steps.run.outputs.WORKBENCH_URL }}
  WORKBENCH_USER:
    description: 'Test username (only set when no command is provided)'
    value: ${{ steps.run.outputs.WORKBENCH_USER }}
  WORKBENCH_PASSWORD:
    description: 'Test user password (only set when no command is provided)'
    value: ${{ steps.run.outputs.WORKBENCH_PASSWORD }}
  CONTAINER_ID:
    description: 'Docker container ID (only set when no command is provided)'
    value: ${{ steps.run.outputs.CONTAINER_ID }}

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v7

    - name: Install with-workbench
      shell: bash
      run: uv tool install ${{ github.action_path }}

    - name: Run command
      id: run
      shell: bash
      env:
        RSW_LICENSE: ${{ inputs.license-key }}
      run: |
        # Handle stop mode
        if [ -n "${{ inputs.stop }}" ]; then
          with-workbench --stop "${{ inputs.stop }}"
          exit 0
        fi

        # Build arguments using array to handle special characters
        ARGS=(--version "${{ inputs.version }}" --port "${{ inputs.port }}" --user "${{ inputs.user }}")
        if [ -n "${{ inputs.image }}" ]; then
          ARGS+=(--image "${{ inputs.image }}")
        fi
        if [ -n "${{ inputs.password }}" ]; then
          ARGS+=(--password "${{ inputs.password }}")
        fi
        if [ "${{ inputs.quiet }}" = "true" ]; then
          ARGS+=(--quiet)
        fi
        if [ -n "${{ inputs.env }}" ]; then
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              ARGS+=(-e "$line")
            fi
          done <<< "${{ inputs.env }}"
        fi

        # Check if command is provided
        if [ -z "${{ inputs.command }}" ]; then
          # Start-only mode: output is already in KEY=value format
          with-workbench "${ARGS[@]}" >> $GITHUB_OUTPUT
        else
          # Run with command
          with-workbench "${ARGS[@]}" -- bash <<'SCRIPT'
        ${{ inputs.command }}
        SCRIPT
        fi
